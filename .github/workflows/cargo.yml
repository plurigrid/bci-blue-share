name: Cargo
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: { contents: read }
concurrency:
  group: cargo-${{ github.ref }}
  cancel-in-progress: true
jobs:
  cargo:
    name: cargo
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release -p bci-core
      - run: cargo build --release -p bci-tui
      - uses: actions/upload-artifact@v4
        with: { name: bci-linux-x86_64, path: target/release/bci, retention-days: 14 }
  cargo-mac:
    name: cargo-mac
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p bci-tui
      - uses: actions/upload-artifact@v4
        with: { name: bci-darwin-arm64, path: target/release/bci, retention-days: 14 }
  trunk:
    name: trunk
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/trunk-action@v0.5.0
      - uses: jetli/wasm-bindgen-action@v0.2.0
        with: { version: '0.2.118' }
      - run: cd web && trunk build --release
      - uses: actions/upload-artifact@v4
        with: { name: web-dist, path: public, retention-days: 14 }
