name: Cargo
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: { contents: read }
concurrency:
  group: cargo-${{ github.ref }}
  cancel-in-progress: true
jobs:
  cargo:
    name: cargo
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release -p osc
      - run: cargo build --release -p osc
      - uses: actions/upload-artifact@v4
        with:
          name: osc-linux-x86_64
          path: target/release/osc
          retention-days: 14
  cargo-mac:
    name: cargo-mac
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p osc
      - uses: actions/upload-artifact@v4
        with:
          name: osc-darwin-arm64
          path: target/release/osc
          retention-days: 14
