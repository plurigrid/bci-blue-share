<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bci.blue — tileable gain-of-function</title>
<meta name="theme-color" content="#564516">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a; color: #c0c0c0;
  font-family: 'SF Mono','Fira Code','Cascadia Code',monospace;
  overflow: hidden; height: 100vh;
}
#grid {
  position: absolute; top: 0; left: 0;
  line-height: 1; white-space: pre;
  font-size: 14px;
}
#grid span { display: inline-block; width: 1ch; height: 1.2em; text-align: center; }
#hud {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,10,10,0.9); border-top: 1px solid #333;
  padding: 6px 12px; font-size: 12px; color: #888;
  display: flex; gap: 16px; z-index: 10;
}
#hud .val { color: #ddd; }
#hud .blue { color: #3B82F6; }
#hud .red { color: #EF4444; }
#hud .pfeiffer { color: #8B3FA6; }
#loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; color: #564516;
  background: #0a0a0a;
}
</style>
</head>
<body>
<div id="loading">loading wasm...</div>
<div id="grid"></div>
<div id="hud">
  <span>gen: <span class="val" id="h-gen">0</span></span>
  <span>tiles: <span class="val" id="h-tiles">0</span></span>
  <span class="blue">empty: <span class="val" id="h-empty">0</span></span>
  <span class="red">infected: <span class="val" id="h-inf">0</span></span>
  <span class="pfeiffer">recomb: <span class="val" id="h-rec">0</span></span>
  <span>immune: <span class="val" id="h-imm">0</span></span>
  <span>GF(3): <span class="val" id="h-trit">0</span></span>
  <span style="margin-left:auto;color:#555">[i]nfect [v]accinate [n/p]focus [space]tick [s]aturate</span>
</div>
<script>
const COLS = Math.floor(window.innerWidth / 8.4);
const ROWS = Math.floor((window.innerHeight - 28) / 16.8);
const TILE_COLS = Math.min(8, Math.max(2, Math.floor(COLS / 10)));
const TILE_ROWS = Math.min(8, Math.max(2, Math.floor(ROWS / 6)));

let wasm;
let cells = [];
let running = false;
let animId = null;

function rgb(packed) {
  const r = (packed >> 16) & 0xff;
  const g = (packed >> 8) & 0xff;
  const b = packed & 0xff;
  return `rgb(${r},${g},${b})`;
}

function render() {
  const total = wasm.tgof_render();
  const cols = wasm.tgof_cols();
  const rows = wasm.tgof_rows();

  const grid = document.getElementById('grid');
  while (cells.length < total) {
    const s = document.createElement('span');
    cells.push(s);
  }

  let html = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const idx = y * cols + x;
      if (idx >= total) break;
      const fg = rgb(wasm.tgof_cell_fg(idx));
      const bg = rgb(wasm.tgof_cell_bg(idx));
      const cp = wasm.tgof_cell_cp(idx);
      const ch = cp > 31 ? String.fromCodePoint(cp) : ' ';
      html += `<span style="color:${fg};background:${bg}">${ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch === '&' ? '&amp;' : ch}</span>`;
    }
    html += '\n';
  }
  grid.innerHTML = html;

  document.getElementById('h-gen').textContent = wasm.tgof_generation();
  document.getElementById('h-tiles').textContent = wasm.tgof_tile_count();
  document.getElementById('h-empty').textContent = wasm.tgof_census_empty();
  document.getElementById('h-inf').textContent = wasm.tgof_census_infected();
  document.getElementById('h-rec').textContent = wasm.tgof_census_recombinant();
  document.getElementById('h-imm').textContent = wasm.tgof_census_immune();
  const trit = wasm.tgof_trit_balance();
  const tritEl = document.getElementById('h-trit');
  tritEl.textContent = trit;
  tritEl.style.color = trit === 0 ? '#8B3FA6' : trit > 0 ? '#EF4444' : '#3B82F6';
}

function tick() {
  wasm.tgof_tick();
  render();
}

function animate() {
  tick();
  if (running) animId = requestAnimationFrame(animate);
}

async function init() {
  const resp = await fetch('/tileable-gof.wasm');
  const bytes = await resp.arrayBuffer();
  const { instance } = await WebAssembly.instantiate(bytes, { env: {} });
  wasm = instance.exports;

  wasm.tgof_init(COLS, ROWS, TILE_COLS, TILE_ROWS);

  document.getElementById('loading').style.display = 'none';
  render();

  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case ' ':
        e.preventDefault();
        if (running) { running = false; cancelAnimationFrame(animId); }
        else tick();
        break;
      case 'i': wasm.tgof_infect_focused(1, 0); render(); break;
      case 'v': wasm.tgof_vaccinate_focused(); render(); break;
      case 'n': wasm.tgof_focus_next(); render(); break;
      case 'p': wasm.tgof_focus_prev(); render(); break;
      case 's': wasm.tgof_tick_saturate(1000); render(); break;
      case 'r': running = !running; if (running) animate(); break;
      case 'Enter': e.preventDefault(); tick(); break;
    }
  });
}

init().catch(e => {
  document.getElementById('loading').textContent = 'error: ' + e.message;
});
</script>
</body>
</html>
